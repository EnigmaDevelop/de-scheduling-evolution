# docker-compose.infra.yml (Güncellenmiş Kısım)
services:

  postgres:
    image: postgres:16-alpine
    container_name: de_postgres
    restart: unless-stopped
    networks:
      - de_network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-de_scheduling}
      POSTGRES_USER: ${POSTGRES_USER:-de_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-de_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-de_user} -d ${POSTGRES_DB:-de_scheduling}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: de_redis
    restart: unless-stopped
    networks:
      - de_network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: de_pgadmin
    restart: unless-stopped
    networks:
      - de_network
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@de.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

# shared network for all services
networks:
  de_network:
    name: de_evolution_network
    driver: bridge
